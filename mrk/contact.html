header {

.card {
  background: #1e293b;

.card:hover {

}

.card h3 {
  margin-bottom: 10px;
}

.card p {
  font-size: 14px;
  color: #aaa;
}

.btn {
  display: inline-block;

  background: #facc15;
  color: #000;
  text-decoration: none;
  border-radius: 6px;
